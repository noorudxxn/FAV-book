<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contact us </title>
</head>
<body>
    <h1>Contact us</h1>
    <form action="">
        <label for="fname" >Full name:</label><br>
        <input type="text" id="fname" placeholder="full name "><br>
        <label for="mob num">mobile number:</label><br>
        <input type="tel" name="mobile number" id="mob num" pattern="[1-9]{10}" maxlength="10"><br>
        <label for="communications">type of communication:</label>
        <select name="communication" id="communications">
            <option value="sales">sales</option>
            <option value="service">service</option>
            <option value="enquiry">enquiry</option>
            <option value="advertisment">advertisment</option>
            <option value="compliant">compliant</option>
        </select><br>
<textarea name="description" id="description" cols="30" rows="10" placeholder="description"></textarea><br>
<input type="submit" name="submit" id="submit"><br>
    </form>
    <a href="news listing page.html">click me to bo back</a>
</body>
</html>
