<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>for loop</title>
</head>
<body>
    <p id="test"></p>
    <script>
        var text = ""
        var i 
        for(i=0;i<=100;i++)
    {
        text+= "the number is" + i + "<br>" ;
    }
    document.getElementById("test").innerHTML = text
    console.log(text)
    </script>
</body>
</html>
