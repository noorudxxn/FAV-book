<body>
    <script>
        let a = Number(prompt("enter the fisrt side :")) ;
        let b = Number(prompt("enter the second side :")) ;
        let c = Number(prompt("enter the third number :")) ;
            console.log("the first side is : " , a ) ;
            console.log("the second side is : " , b ) ;
            console.log("the third side is : " , c ) ;
        if ( a==b && b==c ) 
            {
            console.log("it is a Equilateral triangle.") ;
            } 
        else if ( a==b || b==c || a==c) 
            {
            console.log("it is a isosceles triangle.") ;
            }
        else
            {
            console.log("it is a scalent triangle")
            }
    </script>
