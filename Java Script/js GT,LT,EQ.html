<head>

</head>
<body>
    <p id="result"></p>
    <p id="test 8"></p>
    <p id="test 9"></p>
    <script>
          let num1 = Number(prompt("enter the first number :" ));
        document.getElementById("test 8").innerHTML = "the first number is :" + num1 ;
        console.log("the first number is :", num1);
        let num2 = Number(prompt("enter the second number :"));
        document.getElementById("test 9").innerHTML = "the second number is :" + num2 ;
        console.log("the second number is :", num2);

          if (num1 > num2) 
        {
            document.getElementById("result").innerHTML = num1 + "is greater and " + num2 + "is smaller" ;
            console.log( num1, "is greater" );
            console.log( num2 , "is smaller");
        } 
        else if(num2 > num1)
        {
            document.getElementById("result").innerHTML = num2 + "is greater and " + num1 + "is smaller" ;
            console.log( num2, "is greater");
            console.log( num1 ,"is smaller" );
        }
        else
        {
            document.getElementById("result").innerHTML = "both are equal" ;
            console.log("both are equal");
        }
    </script>
</body>
