<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grading system</title>
</head>
<body>
    <script>
        let grade = Number(prompt("enter the grade of the student"));
            console.log("the student grade is " , grade);
        if (grade >= 90 && grade <= 100) 
        {
         console.log(" GRADE A ");   
        } 
        else if (grade >= 80 && grade <= 90)
        {
            console.log(" GRADE B ");
        }
        else if (grade >=70 && grade <= 80)
        {
            console.log(" GRADE C ");
        }
        else if (grade >= 60 && grade <= 70)
        {
            console.log(" GRADE D ");
        }
        else if (grade >= 0 && grade<= 60 )
        {
            console.log("FAILED");
        }
        else
        {
            console.log("entered invalid marks");
        }
    </script>
</body>
</html>
