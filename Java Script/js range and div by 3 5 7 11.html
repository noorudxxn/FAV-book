<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>range div by 5&11 and 3&7</title>
</head>
<body>
    <script>
        let num = Number(prompt("enter the number"));
            console.log("the entered number is ", num );
        if (num >= "0" && num <= "100" ) 
        {
            console.log("the number " + num +  " is in the range 1 to 100");   
        } 
        else 
        {
        console.log("the number " + num +  " is not in the range 1 to 100");    
        }
       
        if (num % 3 == 0 && num % 7 == 0 ) 
        {
            console.log(num , " is divisible is 3 and 7 " );    
        } 
        else 
        {
            console.log( num , " is not divisible by 3 and 7 ") ;    
        }
       
        if (num % 5 == 0 && num % 11 == 0) 
        {
            console.log( num ," is divisible by 5 and 11");    
        } 
        else 
        {
            console.log( num , " is not divisible by 5 and 11");    
        }
    </script>
</body>
</html>
