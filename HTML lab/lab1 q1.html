<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
</head>
<body>
    <form action="" method="" >
        <label for="fname">enter your fullname:</label><br>
        <input type="text" name="fullname" id="fname" placeholder="fullname" required maxlength="25" ><br>
        <label for="email">enter your email:</label><br>
        <input type="email" name="mailid" id="email" value="test@example.com" required autofocus><br>
        <label for="pass">enter your password:</label><br>
        <input type="password" name="password" id="pass" placeholder="password" required size="10" maxlength="6"><br>
        <label for="drop">Category:</label>
        <select name="Category" id="drop" required>
            <option value="student">student</option>
            <option value="Employee">Employee</option>
            <option value="freelancer" selected>freelancer</option>
        </select><br>
        <label for="date">Event date</label><br>
        <input type="date" name="eventdate" id="date" required>
        <label for="ticket" ></label><br>
        <input type="radio" name="1 ticket" id="ticket" value="1 ticket"> 1 ticket <br>
        <input type="radio" name="2 ticket" id="ticket" value="2 ticket" checked>2 ticket  <br>
        <input type="radio" name="3 ticket" id="ticket" value="3 ticket">3 ticket <br>
        <label for="payment">Online payment</label>
        <input type="checkbox" name="Online payment" id="payment" required><br>
        <label for="text area">notes</label><br>
        <textarea name="text" id="text area" rows="10" cols="20" placeholder="notes to be written"></textarea><br>
        <input type="submit" value="submit">
    </form>
</body>
</html>
