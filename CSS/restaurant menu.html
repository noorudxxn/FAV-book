<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>restaurant menu </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        .menu
        {
            h3 
            {
                text-align: right;
                font-size: xx-large;
                font-family: 'Times New Roman', Times, serif;
                color: darkblue;
            }
            p 
            {
                text-align: center;
                text-transform: uppercase;
            }
            table , th, td 
            {
                border: 6px solid black;
                width: 60%;
                margin: 20px auto;
                border-collapse: collapse;
                padding: 12px;
                text-align: center;
                vertical-align: middle;
            }
            i
            {
                color: orange;
                font-size: 30px;
                margin: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="menu">
        <h3>
            <i class="fa-solid fa-utensils"></i>
            Snack Shack restaurant
            <i class="fa-solid fa-burger"></i>
        </h3>
        <p>Great Food, Great Friends, Great Memories - Welcome to Snack Shack Restaurant.</p>
        <table>
        
            <tr>
                <th>Dishes</th>
                <th>prize</th>
            </tr>
            <tr>
                <td>burger</td>
                <td>150rs</td>
            </tr>
            <tr>
                <td>pizza</td>
                <td>320rs</td>
            </tr>
            <tr>
                <td>sadhya</td>
                <td>200rs</td>
            </tr>
        </table>
    </div>
</body>
</html>
